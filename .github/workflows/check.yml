name: template-check

# Validates template integrity + secrets hygiene on every push/PR. Runs NO project
# build/test. It DOES run repo scripts (check-template.sh) + a downloaded scanner, so on a
# PUBLIC repo a fork PR's edits to those execute on the runner — but `pull_request` gives a
# read-only token with no secrets, limiting the blast radius. Don't switch to
# pull_request_target, and don't add secret-bearing steps here.

on: [push, pull_request]

permissions:
  contents: read   # least privilege

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a commit SHA (a tag is mutable; a SHA is not) —
      # the posture docs/skill-security.md teaches. Bump deliberately; the trailing comment
      # records the human-readable tag the SHA maps to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0   # full history so the secret scan sees all commits
      - name: Template self-check
        # § 3 (@-reference resolution) runs unconditionally and fails on any
        # @-ref whose target file is missing — in adopter repos this catches
        # unrepointed @templates/ refs after a relocate/strip.
        run: bash scripts/check-template.sh
      - name: Secret scan (gitleaks)
        # Pinned, checksum-verified MIT CLI binary — NOT the gitleaks-action (which is
        # proprietary, needs a license key for org repos, and phones home to keygen.sh).
        # The binary makes no network/API calls, so it sidesteps token/permission issues.
        # Bump GITLEAKS_VERSION to update; the matching checksums file ships with each
        # release. See docs/skill-security.md.
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"   # x64 matches ubuntu-latest; change for arm/self-hosted
          curl -sSfL "$base/$asset" -o "$asset"
          curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "$asset" checksums.txt | sha256sum -c -   # fail closed if asset/hash missing
          tar -xzf "$asset" gitleaks
          chmod +x gitleaks
          # Scan full git history (fetch-depth: 0 above); exits non-zero if a secret is found.
          ./gitleaks git . --redact --no-banner --verbose
